<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soleil Palms Resort — Cabana Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->

    <header class="header">
        <div class="container">
            <div>
                <div class="header__name">Soleil Palms</div>
                <div class="header__tagline"><span>🌴</span>Poolside Cabana Reservations</div>
            </div>
            <div class="header__right">
                <div class="header__date" id="header-date"></div>
                <div class="header__text">Choose your perfect poolside retreat from the map.</div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container">
            <section class="map-header">
                <div class="map-header__title">Resort Map — click a cabana to book</div>
                <div class="map-header__legend">
                    <div class="legend__item">
                        <img src="assets/cabana.png" alt="Available Cabana"
                            class="legend__icon legend__icon--available" />
                        <span>Available</span>
                    </div>
                    <div class="legend__item">
                        <img src="assets/cabana.png" alt="Booked Cabana" class="legend__icon legend__icon--booked" />
                        <span>Booked</span>
                    </div>
                    <div class="legend__item">
                        <img src="assets/textureWater.png" alt="Pool" class="legend__icon legend__icon--pool" />
                        <span>Pool</span>
                    </div>
                    <div class="legend__item">
                        <img src="assets/arrowStraight.png" alt="Path" class="legend__icon legend__icon--path" />
                        <span>Path</span>
                    </div>
                    <div class="legend__item">
                        <img src="assets/houseChimney.png" alt="Chalet" class=" legend__icon legend__icon--chalet" />
                        <span>Chalet</span>
                    </div>
                </div>
            </section>

            <!-- Stats -->
            <div class="stats" id="stats">
                <div class="stats__item">
                    <div class="stats__value" id="stats-total">—</div>
                    <div class="stats__label">Total Cabanas</div>
                </div>
                <div class="stats__item">
                    <div class="stats__value" id="stats-available">—</div>
                    <div class="stats__label">Available</div>
                </div>
                <div class="stats__item">
                    <div class="stats__value" id="stats-booked">—</div>
                    <div class="stats__label">Reserved</div>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
