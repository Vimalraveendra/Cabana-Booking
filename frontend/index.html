<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soleil Palms Resort — Cabana Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->

    <header>
        <div class="container">
            <div>
                <div class="resort-name">Soleil Palms</div>
                <div class="resort-tagline"><span>🌴</span>Poolside Cabana Reservations</div>
            </div>
            <div class="header-right">
                <div class="date-display" id="date-display"></div>
                <div class="state active" id="state-idle">
                    <div class="idle-text">Choose your perfect poolside retreat from the map.</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main>
        <div class="container">
            <section class="map-header">
                <div class="map-title">Resort Map — click a cabana to book</div>
                <div class="legend">
                    <div class="legend-item">
                        <img src="assets/cabana.png" alt="Available Cabana" class="legend-icon cabana-avail" />
                        <span>Available</span>
                    </div>
                    <div class="legend-item">
                        <img src="assets/cabana.png" alt="Booked Cabana" class="legend-icon cabana-booked" />
                        <span>Booked</span>
                    </div>
                    <div class="legend-item">
                        <img src="assets/textureWater.png" alt="Pool" class="legend-icon pool" />
                        <span>Pool</span>
                    </div>
                    <div class="legend-item">
                        <img src="assets/arrowStraight.png" alt="Path" class="legend-icon path" />
                        <span>Path</span>
                    </div>
                    <div class="legend-item">
                        <img src="assets/houseChimney.png" alt="Chalet" class=" legend-icon chalet" />
                        <span>Chalet</span>
                    </div>
                </div>
            </section>

            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-val" id="stat-total">—</div>
                    <div class="stat-label">Total Cabanas</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="stat-avail">—</div>
                    <div class="stat-label">Available</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="stat-booked">—</div>
                    <div class="stat-label">Reserved</div>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
